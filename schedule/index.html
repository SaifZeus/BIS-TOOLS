<!DOCTYPE html>
<html lang="en">
<head>
        <!-- Disable  -->
<script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool'></script>
    <!-- ### -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIS Schedule Builder | Helwan University</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
      <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
     <!-- Favicon -->
    <link rel="icon" type="image/png" href="../BIS-LOGO.jpg">
    
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <div class="logo-container">
                <img src="../BIS-LOGO.jpg" alt="BIS Logo" class="logo">
            </div>
            <h1>BIS Schedule Builder</h1>
            <p>Create Your Perfect Class Schedule</p>
            <div class="nav-buttons">
                <a href="../index.html" class="nav-btn">
<svg class="two-icons" viewBox="0 0 640 640" fill="currentColor">
<path d="M341.8 72.6C329.5 61.2 310.5 61.2 298.3 72.6L74.3 280.6C64.7 289.6 61.5 303.5 66.3 315.7C71.1 327.9 82.8 336 96 336L112 336L112 512C112 547.3 140.7 576 176 576L464 576C499.3 576 528 547.3 528 512L528 336L544 336C557.2 336 569 327.9 573.8 315.7C578.6 303.5 575.4 289.5 565.8 280.6L341.8 72.6zM304 384L336 384C362.5 384 384 405.5 384 432L384 528L256 528L256 432C256 405.5 277.5 384 304 384z"/></svg>
                 Home Page
                </a>    
                <a href="../GPA-Calculator/index.html" class="nav-btn">
<svg class="two-icons" viewBox="0 0 24 24" fill="currentColor">
 <path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
                    GPA Calculator
                </a>
            </div>
        </div>

        <!-- Main Card -->
        <div class="main-card">
            <!-- Year Selection Section -->
            <div class="selection-section">
                <h2 class="selection-title">Select Your Academic Year</h2>
                <div class="year-grid">
                    <button class="year-card" onclick="selectYear(1)">
                        <div class="year-number">1</div>
                        <div class="year-label">First Year</div>
                    </button>
                    <button class="year-card" onclick="selectYear(2)">
                        <div class="year-number">2</div>
                        <div class="year-label">Second Year</div>
                    </button>
                    <button class="year-card" onclick="selectYear(3)">
                        <div class="year-number">3</div>
                        <div class="year-label">Third Year</div>
                    </button>
                    <button class="year-card" onclick="selectYear(4)">
                        <div class="year-number">4</div>
                        <div class="year-label">Fourth Year</div>
                    </button>
                </div>
            </div>

            <!-- Subject Selection Section -->
            <div id="subjectSection" style="display: none;">
                <div class="subjects-header">
                    <h3>Available Subjects</h3>
                    <button class="btn btn-secondary" onclick="resetSchedule()">
                        <svg class="icon-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
                        </svg>
                        Reset
                    </button>
                </div>
                <div id="subjectsContainer" class="subjects-grid"></div>
            </div>

            <!-- Schedule Table -->
            <div id="scheduleSection" style="display: none;">
                <div class="schedule-header">
                    <h3>
                        <svg class="icon-heading" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2zm-8 4H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/>
                        </svg>
                        Your Schedule
                    </h3>
                    <div class="schedule-actions">
                        <button class="btn btn-success" onclick="downloadAsImage()">
                            <svg class="icon-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                                <circle cx="12" cy="13" r="4"/>
                            </svg>
                            Download as Image
                        </button>
                        <button class="btn btn-secondary" onclick="downloadAsPDF()">
                            <svg class="icon-btn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                                <polyline points="10 9 9 9 8 9"/>
                            </svg>
                            Export to PDF
                        </button>
                    </div>
                </div>
                
                <div id="scheduleTableContainer" class="schedule-table-wrapper">
                    <table class="schedule-table" id="scheduleTable">
                        <thead>
                            <tr>
                                <th class="day-column">Day / Time</th>
								<th>8:00 - 10:00</th>
                                <th>10:00 - 12:00</th>
                                <th>12:00 - 2:00</th>
                                <th>2:00 - 4:00</th>
                                <th>4:00 - 6:00</th>
                                <th>6:00 - 8:00</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleBody">
                            <!-- Will be generated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-content">
                <div class="footer-divider"></div>
                <p class="footer-text">Made by <strong>Saif Wael</strong></p>
                <p class="footer-text"><strong></strong></p>

                <div class="footer-social">
                    <a href="https://www.linkedin.com/in/saifwael/" target="_blank" class="social-link">
                        <svg class="icon-social" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                        </svg>
                        LinkedIn
                    </a>
                    <a href="https://www.facebook.com/ReaMrZeus" target="_blank" class="social-link">
                        <svg class="icon-social" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                        Facebook
                    </a>
                    <a href="https://www.facebook.com/BIS.FCBA.Helwan.uni" target="_blank" class="social-link">
                        <svg class="icon-social" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                        BIS Page
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
